            <p style={{ color: "#e2e8f0", fontSize: 13, lineHeight: 1.7, margin: "0 0 1rem" }}>{principle.caseStudy.context}</p>
            <p style={{ color: "#64748b", fontSize: 11, margin: 0 }}>External reference: {principle.caseStudy.externalSource}</p>
          </div>
          <div style={{ marginBottom: "1rem" }}>
            {principle.caseStudy.prompts.map((prompt, i) => (
              <div key={i} style={{ display: "flex", gap: 10, padding: "0.7rem 0", borderBottom: i < principle.caseStudy.prompts.length - 1 ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
                <span style={{ color: "#52B788", fontSize: 13, minWidth: 20 }}>{i + 1}.</span>
                <p style={{ color: "#94a3b8", fontSize: 13, lineHeight: 1.6, margin: 0 }}>{prompt}</p>
              </div>
            ))}
          </div>
          <textarea value={caseResponse} onChange={e => setCaseResponse(e.target.value)} placeholder="Write your case analysis here..."
            style={{ width: "100%", minHeight: 200, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "1rem", color: "#e2e8f0", fontSize: 13, fontFamily: "Georgia, serif", lineHeight: 1.7, resize: "vertical", outline: "none", boxSizing: "border-box" }} />
        </div>
      )}

      {tab === "reflect" && (
        <div>
          <div style={{ background: "rgba(45,106,79,0.1)", border: "1px solid rgba(116,198,157,0.2)", borderRadius: 8, padding: "1.2rem", marginBottom: "1.2rem" }}>
            <p style={{ color: "#B7E4C7", fontSize: 14, lineHeight: 1.7, margin: 0, fontStyle: "italic" }}>"{principle.reflection}"</p>
          </div>
          <textarea value={reflection} onChange={e => setReflection(e.target.value)} placeholder="Your reflection..."
            style={{ width: "100%", minHeight: 220, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "1rem", color: "#e2e8f0", fontSize: 13, fontFamily: "Georgia, serif", lineHeight: 1.7, resize: "vertical", outline: "none", boxSizing: "border-box" }} />
        </div>
      )}

      {(tab === "case" || tab === "reflect" || (tab === "quiz" && quizData)) && (
        <button onClick={handleSave}
          style={{ marginTop: "1rem", padding: "0.6rem 1.5rem", background: saved ? "rgba(45,106,79,0.5)" : "rgba(255,255,255,0.06)", border: saved ? "1px solid rgba(116,198,157,0.5)" : "1px solid rgba(255,255,255,0.12)", borderRadius: 6, color: saved ? "#B7E4C7" : "#94a3b8", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 13, transition: "all 0.2s" }}>
          {saved ? "✓ Saved to Portfolio" : "Save Progress"}
        </button>
      )}
    </div>
  );
}

// ─── INSTRUMENT VIEW ──────────────────────────────────────────────────────────

function InstrumentView({ instrument, savedData, onSave, bridgeDeclaration }) {
  const [activeSection, setActiveSection] = useState(instrument.sections[0].id);
  const [drafts, setDrafts] = useState(savedData?.drafts || {});
  const [saved, setSaved] = useState(false);

  const handleSave = () => { onSave({ drafts }); setSaved(true); setTimeout(() => setSaved(false), 2000); };
  const completedSections = instrument.sections.filter(s => (drafts[s.id] || "").trim().length > 50).length;

  return (
    <div style={{ fontFamily: "Georgia, serif" }}>
      <div style={{ marginBottom: "1.5rem" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
          <span style={{ background: "rgba(27,67,50,0.4)", border: "1px solid rgba(116,198,157,0.4)", borderRadius: 20, padding: "2px 12px", fontSize: 12, color: "#74C69D" }}>Policy Instrument · {completedSections}/{instrument.sections.length} sections drafted</span>
        </div>
        <h2 style={{ color: "#f0fdf4", fontSize: "1.6rem", fontWeight: 400, margin: "0 0 0.5rem" }}>{instrument.full}</h2>
        <p style={{ color: "#94a3b8", fontSize: 14, lineHeight: 1.6, margin: 0 }}>{instrument.description}</p>
      </div>

      {/* Bridge Declaration reminder */}
      {bridgeDeclaration && (
        <div style={{ background: "rgba(45,106,79,0.1)", border: "1px solid rgba(116,198,157,0.25)", borderRadius: 8, padding: "0.9rem 1.1rem", marginBottom: "1.2rem", display: "flex", gap: 10 }}>
          <span style={{ color: "#52B788", fontSize: 14, flexShrink: 0 }}>◈</span>
          <div>
            <p style={{ color: "#74C69D", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", margin: "0 0 3px" }}>Your Bridge Declaration</p>
            <p style={{ color: "#B7E4C7", fontSize: 12, lineHeight: 1.6, margin: 0, fontStyle: "italic" }}>{bridgeDeclaration}</p>
          </div>
        </div>
      )}

      <div style={{ height: 4, background: "rgba(255,255,255,0.08)", borderRadius: 2, marginBottom: "1.5rem" }}>
        <div style={{ height: "100%", borderRadius: 2, transition: "width 0.5s", background: "linear-gradient(90deg, #2D6A4F, #74C69D)", width: `${(completedSections / instrument.sections.length) * 100}%` }} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", gap: "1.5rem" }}>
        <div>
          {instrument.sections.map((s) => {
            const isDone = (drafts[s.id] || "").trim().length > 50;
            const isActive = activeSection === s.id;
            return (
              <button key={s.id} onClick={() => setActiveSection(s.id)}
                style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "0.6rem 0.8rem", background: isActive ? "rgba(45,106,79,0.25)" : "transparent", border: isActive ? "1px solid rgba(116,198,157,0.3)" : "1px solid transparent", borderRadius: 6, cursor: "pointer", textAlign: "left", marginBottom: 4, transition: "all 0.15s" }}>
                <span style={{ flexShrink: 0 }}>{isDone ? <CheckIcon /> : <div style={{ width: 16, height: 16, borderRadius: "50%", border: "1.5px solid #334155" }} />}</span>
                <span style={{ color: isActive ? "#B7E4C7" : "#64748b", fontSize: 12, fontFamily: "Georgia, serif", lineHeight: 1.4 }}>{s.title}</span>
              </button>
            );
          })}
        </div>
        <div>
          {instrument.sections.filter(s => s.id === activeSection).map(section => (
            <div key={section.id}>
              <h3 style={{ color: "#e2e8f0", fontSize: "1rem", fontWeight: 600, margin: "0 0 0.8rem" }}>{section.title}</h3>
              <div style={{ background: "rgba(45,106,79,0.1)", border: "1px solid rgba(116,198,157,0.2)", borderRadius: 6, padding: "0.9rem", marginBottom: "1rem" }}>
                <p style={{ color: "#B7E4C7", fontSize: 12, lineHeight: 1.7, margin: 0 }}><strong>Drafting Guidance:</strong> {section.prompt}</p>
              </div>
              <textarea value={drafts[section.id] || ""} onChange={e => setDrafts({ ...drafts, [section.id]: e.target.value })} placeholder={`Draft your ${section.title} here...`}
                style={{ width: "100%", minHeight: 240, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "1rem", color: "#e2e8f0", fontSize: 13, fontFamily: "Georgia, serif", lineHeight: 1.7, resize: "vertical", outline: "none", boxSizing: "border-box" }} />
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
                <span style={{ color: "#475569", fontSize: 11 }}>{(drafts[section.id] || "").trim().length > 50 ? "✓ Section meets minimum length" : "Draft at least 50 characters to mark complete"}</span>
                <div style={{ display: "flex", gap: 8 }}>
                  {instrument.sections.findIndex(s => s.id === activeSection) < instrument.sections.length - 1 && (
                    <button onClick={() => { const idx = instrument.sections.findIndex(s => s.id === activeSection); setActiveSection(instrument.sections[idx + 1].id); }}
                      style={{ padding: "0.5rem 1rem", background: "rgba(45,106,79,0.2)", border: "1px solid rgba(116,198,157,0.3)", borderRadius: 6, color: "#74C69D", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12 }}>Next Section →</button>
                  )}
                  <button onClick={handleSave}
                    style={{ padding: "0.5rem 1rem", background: saved ? "rgba(45,106,79,0.5)" : "rgba(255,255,255,0.06)", border: saved ? "1px solid rgba(116,198,157,0.5)" : "1px solid rgba(255,255,255,0.12)", borderRadius: 6, color: saved ? "#B7E4C7" : "#94a3b8", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 12, transition: "all 0.2s" }}>
                    {saved ? "✓ Saved" : "Save Draft"}
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── PORTFOLIO VIEW ───────────────────────────────────────────────────────────

function PortfolioView({ studentName, progress, portfolioData }) {
  const completedPrinciples = Object.keys(progress.principles || {}).length;
  const bridgeDone = progress.bridgeComplete || false;
  const completedInstruments = INSTRUMENTS.filter(inst => Object.keys((portfolioData[`inst_${inst.id}`]?.drafts) || {}).filter(k => ((portfolioData[`inst_${inst.id}`]?.drafts || {})[k] || "").trim().length > 50).length >= 3).length;
  const totalSteps = 10 + 1 + 3;
  const completed = completedPrinciples + (bridgeDone ? 1 : 0) + completedInstruments;

  return (
    <div style={{ fontFamily: "Georgia, serif" }}>
      <h2 style={{ color: "#f0fdf4", fontSize: "1.4rem", fontWeight: 400, margin: "0 0 1.5rem" }}>Portfolio — {studentName}</h2>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: "1.5rem" }}>
        {[
          { label: "Principles", value: `${completedPrinciples}/10` },
          { label: "Bridge", value: bridgeDone ? "Complete" : "In Progress" },
          { label: "Instruments", value: `${completedInstruments}/3` },
          { label: "Overall", value: `${Math.round((completed / totalSteps) * 100)}%` },
        ].map(stat => (
          <div key={stat.label} style={{ background: "rgba(45,106,79,0.1)", border: "1px solid rgba(116,198,157,0.2)", borderRadius: 8, padding: "1rem", textAlign: "center" }}>
            <div style={{ color: "#74C69D", fontSize: "1.4rem", fontWeight: 300, marginBottom: 4 }}>{stat.value}</div>
            <div style={{ color: "#e2e8f0", fontSize: 12 }}>{stat.label}</div>
          </div>
        ))}
      </div>

      {/* Principles grid */}
      <div style={{ marginBottom: "1.5rem" }}>
        <p style={{ color: "#74C69D", fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: "0.8rem" }}>Principles Engagement</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 8 }}>
          {PRINCIPLES.map(p => {
            const data = portfolioData[`principle_${p.id}`];
            const hasQuiz = data?.quiz?.score !== undefined;
            const hasCase = (data?.caseResponse || "").trim().length > 30;
            const hasReflect = (data?.reflection || "").trim().length > 30;
            const completed = hasQuiz && hasCase && hasReflect;
            const partial = hasQuiz || hasCase || hasReflect;
            return (
              <div key={p.id} style={{ background: completed ? "rgba(45,106,79,0.25)" : partial ? "rgba(45,106,79,0.1)" : "rgba(255,255,255,0.03)", border: completed ? "1px solid rgba(116,198,157,0.4)" : "1px solid rgba(255,255,255,0.07)", borderRadius: 6, padding: "0.7rem", textAlign: "center" }}>
                <div style={{ color: completed ? "#74C69D" : partial ? "#52B788" : "#334155", fontSize: 18, marginBottom: 4 }}>{completed ? "✓" : partial ? "◑" : "○"}</div>
                <div style={{ color: completed ? "#B7E4C7" : "#64748b", fontSize: 10, lineHeight: 1.4 }}>{p.short}</div>
                {hasQuiz && <div style={{ color: "#52B788", fontSize: 10, marginTop: 3 }}>{data.quiz.score}/{data.quiz.total}</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Bridge status */}
      <div style={{ marginBottom: "1.5rem", background: bridgeDone ? "rgba(45,106,79,0.15)" : "rgba(255,255,255,0.03)", border: bridgeDone ? "1px solid rgba(116,198,157,0.3)" : "1px solid rgba(255,255,255,0.07)", borderRadius: 8, padding: "1rem" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: bridgeDone ? 8 : 0 }}>
          <span style={{ color: "#e2e8f0", fontSize: 14 }}>Bridge Module — From Evidence to Instrument</span>
          <span style={{ color: bridgeDone ? "#52B788" : "#475569", fontSize: 12 }}>{bridgeDone ? "✓ Complete" : "In Progress"}</span>
        </div>
        {bridgeDone && portfolioData.bridge?.declarations && (
          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginTop: 8 }}>
            {INSTRUMENTS.map(inst => (
              <div key={inst.id} style={{ fontSize: 12, color: "#64748b", lineHeight: 1.5 }}>
                <strong style={{ color: "#74C69D" }}>{inst.short}:</strong> {(portfolioData.bridge?.declarations?.[inst.id] || "").substring(0, 80)}{(portfolioData.bridge?.declarations?.[inst.id] || "").length > 80 ? "…" : ""}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Instruments */}
      <div>
        <p style={{ color: "#74C69D", fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: "0.8rem" }}>Policy Instruments</p>
        {INSTRUMENTS.map(inst => {
          const data = portfolioData[`inst_${inst.id}`];
          const draftedSections = Object.keys(data?.drafts || {}).filter(k => (data.drafts[k] || "").trim().length > 50).length;
          return (
            <div key={inst.id} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 8, padding: "1rem", marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ color: "#e2e8f0", fontSize: 14 }}>{inst.full}</span>
                <span style={{ color: "#52B788", fontSize: 12 }}>{draftedSections}/{inst.sections.length} sections</span>
              </div>
              <div style={{ height: 4, background: "rgba(255,255,255,0.06)", borderRadius: 2 }}>
                <div style={{ height: "100%", borderRadius: 2, background: "linear-gradient(90deg, #2D6A4F, #74C69D)", width: `${(draftedSections / inst.sections.length) * 100}%`, transition: "width 0.5s" }} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

function App() {
  const [phase, setPhase] = useState("loading");
  const [studentName, setStudentName] = useState("");
  const [studentMode, setStudentMode] = useState("");
  const [activeNode, setActiveNode] = useState(null);
  const [portfolioData, setPortfolioData] = useState({});
  const [progress, setProgress] = useState({ principles: {}, bridgeComplete: false, instruments: {} });

  useEffect(() => {
    async function init() {
      const saved = await loadState("php_session_v2");
      if (saved) {
        setStudentName(saved.name); setStudentMode(saved.mode);
        setPortfolioData(saved.portfolio || {});
        setProgress(saved.progress || { principles: {}, bridgeComplete: false, instruments: {} });
        setPhase("dashboard");
      } else { setPhase("orientation"); }
    }
    init();
  }, []);

  const persist = async (newPortfolio, newProgress) => {
    setPortfolioData(newPortfolio); setProgress(newProgress);
    await saveState("php_session_v2", { name: studentName, mode: studentMode, portfolio: newPortfolio, progress: newProgress });
  };

  const handleBegin = async (name, mode) => {
    setStudentName(name); setStudentMode(mode);
    await saveState("php_session_v2", { name, mode, portfolio: {}, progress: { principles: {}, bridgeComplete: false, instruments: {} } });
    setPhase("dashboard");
  };

  const handleSaveNodeData = async (nodeKey, data) => {
    const newPortfolio = { ...portfolioData, [nodeKey]: data };
    const newProgress = { ...progress };
    if (nodeKey.startsWith("principle_")) { const id = parseInt(nodeKey.split("_")[1]); newProgress.principles[id] = true; }
    else if (nodeKey === "bridge") {
      const allRevealed = BRIDGE_EXERCISES.every((_, i) => data?.exercises?.[i]?.analysisRevealed);
      const allDeclared = INSTRUMENTS.every(inst => (data?.declarations?.[inst.id] || "").trim().length > 40);
      newProgress.bridgeComplete = allRevealed && allDeclared;
    } else if (nodeKey.startsWith("inst_")) { newProgress.instruments[nodeKey] = true; }
    await persist(newPortfolio, newProgress);
  };

  const allPrinciplesDone = Object.keys(progress.principles || {}).length >= 10;
  const bridgeDone = progress.bridgeComplete || false;
  const instrumentsUnlocked = allPrinciplesDone && bridgeDone;

  const getNodeStatus = (key) => {
    if (key === "bridge") {
      if (!allPrinciplesDone) return "locked";
      return bridgeDone ? "complete" : "available";
    }
    if (key.startsWith("inst_")) {
      if (!instrumentsUnlocked) return "locked";
      const data = portfolioData[key];
      const drafted = Object.keys(data?.drafts || {}).filter(k => (data.drafts[k] || "").trim().length > 50).length;
      return drafted >= 3 ? "complete" : drafted > 0 ? "active" : "available";
    }
    const data = portfolioData[key];
    if (!data) return "available";
    const hasQuiz = data?.quiz?.score !== undefined;
    const hasCase = (data?.caseResponse || "").trim().length > 30;
    const hasReflect = (data?.reflection || "").trim().length > 30;
    if (hasQuiz && hasCase && hasReflect) return "complete";
    if (hasQuiz || hasCase || hasReflect) return "active";
    return "available";
  };

  if (phase === "loading") return <div style={{ minHeight: "100vh", background: "#0a1628", display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: "#52B788", fontFamily: "Georgia, serif" }}>Loading…</div></div>;
  if (phase === "orientation") return <OrientationScreen onBegin={handleBegin} />;

  return (
    <div style={{ minHeight: "100vh", background: "#0b1a14", display: "grid", gridTemplateColumns: "260px 1fr 280px", fontFamily: "Georgia, serif" }}>

      {/* ── LEFT RAIL ── */}
      <div style={{ background: "#080f0c", borderRight: "1px solid rgba(255,255,255,0.06)", padding: "1.5rem 0", overflowY: "auto", maxHeight: "100vh", position: "sticky", top: 0 }}>
        <div style={{ padding: "0 1rem 1rem", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
          <div style={{ color: "#74C69D", fontSize: 10, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 4 }}>Population Health Policy</div>
          <div style={{ color: "#f0fdf4", fontSize: 14 }}>{studentName}</div>
          <div style={{ color: "#475569", fontSize: 11 }}>{studentMode} mode</div>
        </div>

        <div style={{ padding: "1rem 0.75rem" }}>
          {/* Principles */}
          <div style={{ color: "#334155", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", padding: "0 0.25rem", marginBottom: "0.5rem" }}>Principles</div>
          {PRINCIPLES.map(p => {
            const status = getNodeStatus(`principle_${p.id}`);
            const isActive = activeNode === `principle_${p.id}`;
            return (
              <button key={p.id} onClick={() => setActiveNode(`principle_${p.id}`)}
                style={{ width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "0.5rem 0.7rem", marginBottom: 2, border: isActive ? "1px solid rgba(116,198,157,0.3)" : "1px solid transparent", background: isActive ? "rgba(45,106,79,0.25)" : "transparent", borderRadius: 6, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
                <div style={{ width: 20, height: 20, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", background: status === "complete" ? "rgba(45,106,79,0.5)" : status === "active" ? "rgba(45,106,79,0.2)" : "rgba(255,255,255,0.05)", border: status === "complete" ? "1px solid rgba(116,198,157,0.5)" : "1px solid rgba(255,255,255,0.1)" }}>
                  {status === "complete" ? <span style={{ color: "#74C69D", fontSize: 10 }}>✓</span> : <span style={{ color: "#475569", fontSize: 9 }}>{p.id}</span>}
                </div>
                <span style={{ color: isActive ? "#B7E4C7" : status === "complete" ? "#52B788" : "#64748b", fontSize: 12, lineHeight: 1.3 }}>{p.short}</span>
              </button>
            );
          })}

          {/* Bridge Node */}
          <div style={{ height: 1, background: "rgba(255,255,255,0.05)", margin: "0.6rem 0.25rem" }} />
          {(() => {
            const bridgeStatus = getNodeStatus("bridge");
            const isActive = activeNode === "bridge";
            const isLocked = bridgeStatus === "locked";
            return (
              <button onClick={() => { if (!isLocked) setActiveNode("bridge"); }}
                style={{ width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "0.6rem 0.7rem", marginBottom: 2, border: isActive ? "1px solid rgba(116,198,157,0.4)" : "1px solid rgba(255,255,255,0.06)", background: isActive ? "rgba(45,106,79,0.2)" : isLocked ? "transparent" : "rgba(116,198,157,0.04)", borderRadius: 8, cursor: isLocked ? "not-allowed" : "pointer", textAlign: "left", transition: "all 0.15s", opacity: isLocked ? 0.45 : 1 }}>
                <div style={{ width: 20, height: 20, borderRadius: 4, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", background: bridgeStatus === "complete" ? "rgba(45,106,79,0.5)" : isLocked ? "rgba(255,255,255,0.03)" : "rgba(116,198,157,0.15)", border: bridgeStatus === "complete" ? "1px solid rgba(116,198,157,0.5)" : "1px solid rgba(116,198,157,0.2)" }}>
                  {isLocked ? <LockIcon /> : bridgeStatus === "complete" ? <span style={{ color: "#74C69D", fontSize: 10 }}>✓</span> : <span style={{ color: "#74C69D", fontSize: 9 }}>◈</span>}
                </div>
                <div>
                  <div style={{ color: isActive ? "#B7E4C7" : isLocked ? "#334155" : "#74C69D", fontSize: 12, lineHeight: 1.2, fontWeight: 600 }}>Bridge Module</div>
                  <div style={{ color: "#475569", fontSize: 10, marginTop: 1 }}>Evidence → Instruments</div>
                </div>
              </button>
            );
          })()}
          <div style={{ height: 1, background: "rgba(255,255,255,0.05)", margin: "0.6rem 0.25rem" }} />

          {/* Instruments */}
          <div style={{ color: "#334155", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", padding: "0 0.25rem", marginBottom: "0.5rem" }}>Policy Instruments</div>
          {INSTRUMENTS.map(inst => {
            const status = getNodeStatus(`inst_${inst.id}`);
            const isActive = activeNode === `inst_${inst.id}`;
            const isLocked = status === "locked";
            return (
              <button key={inst.id} onClick={() => { if (!isLocked) setActiveNode(`inst_${inst.id}`); }}
                style={{ width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "0.5rem 0.7rem", marginBottom: 2, border: isActive ? "1px solid rgba(116,198,157,0.4)" : "1px solid transparent", background: isActive ? "rgba(27,67,50,0.4)" : "transparent", borderRadius: 6, cursor: isLocked ? "not-allowed" : "pointer", textAlign: "left", transition: "all 0.15s", opacity: isLocked ? 0.4 : 1 }}>
                <div style={{ width: 20, height: 20, borderRadius: 4, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", background: status === "complete" ? "rgba(45,106,79,0.6)" : isLocked ? "rgba(255,255,255,0.03)" : "rgba(45,106,79,0.2)", border: status === "complete" ? "1px solid rgba(116,198,157,0.6)" : "1px solid rgba(255,255,255,0.1)" }}>
                  {isLocked ? <LockIcon /> : status === "complete" ? <span style={{ color: "#74C69D", fontSize: 10 }}>✓</span> : <span style={{ color: "#52B788", fontSize: 8 }}>◈</span>}
                </div>
                <span style={{ color: isActive ? "#B7E4C7" : isLocked ? "#334155" : "#64748b", fontSize: 12, lineHeight: 1.3 }}>{inst.short}</span>
              </button>
            );
          })}

          <div style={{ height: 1, background: "rgba(255,255,255,0.05)", margin: "0.75rem 0.25rem" }} />
          <button onClick={() => setActiveNode("portfolio")}
            style={{ width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "0.5rem 0.7rem", border: activeNode === "portfolio" ? "1px solid rgba(116,198,157,0.3)" : "1px solid transparent", background: activeNode === "portfolio" ? "rgba(45,106,79,0.25)" : "transparent", borderRadius: 6, cursor: "pointer", textAlign: "left" }}>
            <span style={{ fontSize: 14, color: "#52B788" }}>◉</span>
            <span style={{ color: activeNode === "portfolio" ? "#B7E4C7" : "#64748b", fontSize: 12 }}>My Portfolio</span>
          </button>
        </div>
      </div>

      {/* ── CENTER WORKSPACE ── */}
      <div style={{ padding: "2rem", overflowY: "auto", maxHeight: "100vh" }}>
        {!activeNode ? (
          <div style={{ maxWidth: 600, margin: "3rem auto", textAlign: "center" }}>
            <div style={{ fontSize: 48, marginBottom: "1.5rem" }}>◈</div>
            <h2 style={{ color: "#f0fdf4", fontWeight: 400, fontSize: "1.5rem", marginBottom: "1rem" }}>Welcome back, {studentName}</h2>
            <p style={{ color: "#64748b", fontSize: 14, lineHeight: 1.7, marginBottom: "2rem" }}>
              {!allPrinciplesDone ? "Work through the 10 principles to build your conceptual foundation. The Bridge module and policy instruments will unlock when you're ready." : !bridgeDone ? "All 10 principles complete. The Bridge module is now open — encounter the evidence before you draft." : "Bridge complete. Your policy instruments are unlocked. Your declarations are waiting in each instrument's workspace."}
            </p>
            <button onClick={() => setActiveNode(!allPrinciplesDone ? "principle_1" : !bridgeDone ? "bridge" : "inst_strategy")}
              style={{ padding: "0.7rem 2rem", background: "linear-gradient(135deg, #2D6A4F, #40916C)", border: "none", borderRadius: 8, color: "#f0fdf4", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 14 }}>
              {!allPrinciplesDone ? "Continue with Principles →" : !bridgeDone ? "Enter the Bridge →" : "Begin Drafting →"}
            </button>
          </div>
        ) : activeNode === "portfolio" ? (
          <PortfolioView studentName={studentName} progress={progress} portfolioData={portfolioData} />
        ) : activeNode === "bridge" ? (
          <BridgeModuleView
            savedData={portfolioData.bridge}
            onSave={(data) => handleSaveNodeData("bridge", data)}
            onComplete={() => setActiveNode("inst_strategy")}
          />
        ) : activeNode.startsWith("principle_") ? (
          <PrincipleView
            principle={PRINCIPLES.find(p => `principle_${p.id}` === activeNode)}
            savedData={portfolioData[activeNode]}
            onSave={(data) => handleSaveNodeData(activeNode, data)}
          />
        ) : activeNode.startsWith("inst_") ? (
          <InstrumentView
            instrument={INSTRUMENTS.find(i => `inst_${i.id}` === activeNode)}
            savedData={portfolioData[activeNode]}
            onSave={(data) => handleSaveNodeData(activeNode, data)}
            bridgeDeclaration={portfolioData.bridge?.declarations?.[activeNode.replace("inst_", "")]}
          />
        ) : null}
      </div>

      {/* ── RIGHT RAIL ── */}
      <div style={{ background: "#060d0a", borderLeft: "1px solid rgba(255,255,255,0.06)", padding: "1.5rem", overflowY: "auto", maxHeight: "100vh", position: "sticky", top: 0 }}>
        <p style={{ color: "#334155", fontSize: 10, letterSpacing: "0.15em", textTransform: "uppercase", margin: "0 0 1rem" }}>Portfolio Snapshot</p>

        {/* Principles grid */}
        <div style={{ marginBottom: "1.5rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
            <span style={{ color: "#64748b", fontSize: 12 }}>Principles</span>
            <span style={{ color: "#52B788", fontSize: 12 }}>{Object.keys(progress.principles || {}).length}/10</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 4 }}>
            {PRINCIPLES.map(p => {
              const data = portfolioData[`principle_${p.id}`];
              const status = data?.quiz?.score !== undefined && (data?.caseResponse || "").length > 30 && (data?.reflection || "").length > 30 ? "done" : data ? "partial" : "empty";
              return (
                <div key={p.id} title={p.short} onClick={() => setActiveNode(`principle_${p.id}`)}
                  style={{ height: 28, borderRadius: 4, cursor: "pointer", background: status === "done" ? "rgba(45,106,79,0.5)" : status === "partial" ? "rgba(45,106,79,0.2)" : "rgba(255,255,255,0.04)", border: status === "done" ? "1px solid rgba(116,198,157,0.4)" : "1px solid rgba(255,255,255,0.07)", display: "flex", alignItems: "center", justifyContent: "center", color: status === "done" ? "#74C69D" : "#334155", fontSize: 10 }}>
                  {p.id}
                </div>
              );
            })}
          </div>
        </div>

        {/* Bridge indicator */}
        <div style={{ marginBottom: "1.5rem", padding: "0.7rem 0.9rem", background: bridgeDone ? "rgba(45,106,79,0.2)" : allPrinciplesDone ? "rgba(116,198,157,0.06)" : "rgba(255,255,255,0.02)", border: bridgeDone ? "1px solid rgba(116,198,157,0.3)" : "1px solid rgba(255,255,255,0.07)", borderRadius: 8, cursor: "pointer" }}
          onClick={() => { if (allPrinciplesDone) setActiveNode("bridge"); }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ color: bridgeDone ? "#74C69D" : allPrinciplesDone ? "#52B788" : "#334155", fontSize: 12 }}>Bridge Module</span>
            <span style={{ fontSize: 11, color: bridgeDone ? "#52B788" : allPrinciplesDone ? "#d48e1a" : "#334155" }}>{bridgeDone ? "✓ Complete" : allPrinciplesDone ? "Ready" : "🔒"}</span>
          </div>
          {allPrinciplesDone && !bridgeDone && (
            <p style={{ color: "#64748b", fontSize: 11, margin: "4px 0 0", lineHeight: 1.4 }}>3 exercises · unlock instruments</p>
          )}
        </div>

        {/* Instruments */}
        <div style={{ marginBottom: "1.5rem" }}>
          <p style={{ color: "#64748b", fontSize: 12, margin: "0 0 0.75rem" }}>Instruments</p>
          {INSTRUMENTS.map(inst => {
            const data = portfolioData[`inst_${inst.id}`];
            const drafted = Object.keys(data?.drafts || {}).filter(k => (data.drafts[k] || "").trim().length > 50).length;
            const isLocked = !instrumentsUnlocked;
            return (
              <div key={inst.id} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ color: isLocked ? "#334155" : "#94a3b8", fontSize: 11 }}>{inst.short}</span>
                  <span style={{ color: "#52B788", fontSize: 11 }}>{isLocked ? "🔒" : `${drafted}/${inst.sections.length}`}</span>
                </div>
                <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2 }}>
                  <div style={{ height: "100%", borderRadius: 2, background: "linear-gradient(90deg, #2D6A4F, #74C69D)", width: isLocked ? "0%" : `${(drafted / inst.sections.length) * 100}%`, transition: "width 0.4s" }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* Status notice */}
        {!allPrinciplesDone && (
          <div style={{ background: "rgba(45,106,79,0.1)", border: "1px solid rgba(116,198,157,0.15)", borderRadius: 8, padding: "0.9rem", marginBottom: "1rem" }}>
            <p style={{ color: "#52B788", fontSize: 11, lineHeight: 1.6, margin: 0 }}>Complete all 10 principles to unlock the Bridge module.</p>
            <p style={{ color: "#475569", fontSize: 10, margin: "0.5rem 0 0" }}>{10 - Object.keys(progress.principles || {}).length} remaining</p>
          </div>
        )}
        {allPrinciplesDone && !bridgeDone && (
          <div style={{ background: "rgba(116,198,157,0.08)", border: "1px solid rgba(116,198,157,0.2)", borderRadius: 8, padding: "0.9rem", marginBottom: "1rem" }}>
            <p style={{ color: "#74C69D", fontSize: 11, lineHeight: 1.6, margin: 0 }}>Bridge module unlocked. Complete 3 exercises + declarations to unlock policy instruments.</p>
          </div>
        )}

        {/* Quick nav */}
        <div>
          <p style={{ color: "#334155", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", margin: "0 0 0.75rem" }}>Quick Jump</p>
          {PRINCIPLES.filter(p => { const d = portfolioData[`principle_${p.id}`]; return !d || !d.quiz || !d.caseResponse || !d.reflection; }).slice(0, 3).map(p => (
            <button key={p.id} onClick={() => setActiveNode(`principle_${p.id}`)}
              style={{ width: "100%", padding: "0.5rem 0.75rem", marginBottom: 4, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 6, cursor: "pointer", textAlign: "left", color: "#64748b", fontFamily: "Georgia, serif", fontSize: 11 }}>
              ↪ {p.short}
            </button>
          ))}
          {allPrinciplesDone && !bridgeDone && (
            <button onClick={() => setActiveNode("bridge")}
              style={{ width: "100%", padding: "0.5rem 0.75rem", marginBottom: 4, background: "rgba(116,198,157,0.08)", border: "1px solid rgba(116,198,157,0.2)", borderRadius: 6, cursor: "pointer", textAlign: "left", color: "#74C69D", fontFamily: "Georgia, serif", fontSize: 11 }}>
              ↪ Bridge Module
            </button>
          )}
          {instrumentsUnlocked && INSTRUMENTS.map(inst => {
            const data = portfolioData[`inst_${inst.id}`];
            const drafted = Object.keys(data?.drafts || {}).filter(k => (data.drafts[k] || "").trim().length > 50).length;
            if (drafted < inst.sections.length) return (
              <button key={inst.id} onClick={() => setActiveNode(`inst_${inst.id}`)}
                style={{ width: "100%", padding: "0.5rem 0.75rem", marginBottom: 4, background: "rgba(45,106,79,0.1)", border: "1px solid rgba(116,198,157,0.2)", borderRadius: 6, cursor: "pointer", textAlign: "left", color: "#52B788", fontFamily: "Georgia, serif", fontSize: 11 }}>
                ↪ {inst.short}
              </button>
            );
            return null;
          })}
        </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(App)
    );
  </script>
</body>
</html>
