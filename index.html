  <script type="text/babel">
    const { useState, useEffect } = React;

// ─── BRIDGE EXERCISES DATA ────────────────────────────────────────────────────

const BRIDGE_EXERCISES = [
  {
    id: "B1",
    instrument: "strategy",
    instrumentLabel: "Population Health Strategy",
    title: "The CHNA That Hid Its Own Answer",
    subtitle: "Toward the Strategy Instrument",
    chapters: "Chapters 1, 2, 6, 7",
    principles: ["Health Equity", "Social Needs", "Continuum of Care", "Evaluation"],
    context: `Riverside Health System completes its triennial Community Health Needs Assessment. The methodology: 400 patient surveys administered in waiting rooms, three physician focus groups, and a review of county mortality data. Top identified needs: diabetes management (system-wide control rate: 68%), hypertension (61%), and behavioral health access (34% utilization). Leadership celebrates the clarity of the findings.

The implementation strategy sets three aggregate targets: raise diabetes control to 75%, hypertension control to 70%, and behavioral health utilization to 45%. All targets are system-wide composites. No social determinants analysis was conducted. No disaggregation by race, income, payer, or language appears in either document. The strategy is formally adopted by the governing board and submitted to TJC.`,
    dataTable: {
      caption: "Data collected but never analyzed — subgroup breakdown of the same three metrics:",
      rows: [
        { category: "Diabetes control — Commercial insured", value: "81%", color: "#52B788" },
        { category: "Diabetes control — Medicare", value: "74%", color: "#74C69D" },
        { category: "Diabetes control — Medicaid", value: "41%", color: "#c94040" },
        { category: "Hypertension control — White patients", value: "71%", color: "#52B788" },
        { category: "Hypertension control — Hispanic patients", value: "58%", color: "#d48e1a" },
        { category: "Hypertension control — Black patients", value: "49%", color: "#c94040" },
        { category: "Behavioral health — English-preferred", value: "38%", color: "#74C69D" },
        { category: "Behavioral health — Spanish-preferred", value: "12%", color: "#c94040" },
        { category: "CHNA survey — Medicaid-enrolled respondents", value: "8%", color: "#c94040" },
      ]
    },
    prediction: {
      question: "If this strategy is executed as written and the aggregate 75% diabetes control target is achieved — what happens to health equity?",
      options: [
        { value: "A", text: "Equity improves — all groups benefit when system-wide performance rises." },
        { value: "B", text: "Equity is unchanged — aggregate targets are neutral with respect to subgroups." },
        { value: "C", text: "Equity likely worsens — aggregate improvement can mask and even widen subgroup gaps, particularly when interventions reach the already-advantaged population first." },
      ],
      correct: "C"
    },
    finding: `The strategy's aggregate target of 75% could be achieved entirely by improving Commercial patients from 81% → 88% while the Medicaid group holds flat at 41%. Aggregate: mission accomplished. Equity gap (Commercial vs. Medicaid): widened from 40 points to 47 points. The strategy contains no mechanism to detect this. The CHNA methodology — with only 8% Medicaid survey representation — structurally excluded the highest-need population from shaping the priorities designed to serve them. TJC and NCQA have no basis for holding this organization accountable for equity because no equity standard was ever written into the document.`,
    analysis: {
      obvious: `The strategy's aggregate targets are blind to equity by design. A 75% composite goal says nothing about whether the 41% Medicaid group moves at all. The CHNA methodology is itself a formalization failure — a needs assessment that underrepresents the highest-need population by a factor of 12:1 (Medicaid patients are ~48% of the patient population but 8% of survey respondents) will systematically produce findings that reflect the concerns of the already-advantaged.`,
      nuanced: `This is the central mechanism by which well-intentioned population health strategies worsen equity: interventions requiring patient engagement, scheduling flexibility, transportation, and health literacy tend to reach commercially insured, English-proficient, stable-housing populations faster and more completely. Without equity-specific targets and disaggregated tracking, the same intervention can simultaneously improve the aggregate metric and widen the disparity — a result that looks like success by every measure the organization chose to measure. Bhattacharya's insistence that equity must be formalized as a purpose statement is not rhetorical — it is the only mechanism that makes this gap visible and actionable before the damage is done.`,
      action: `The strategy must be rebuilt with four structural additions: (1) Population-specific targets disaggregated by payer, race, and language — not as a supplement to aggregate targets but as primary accountability metrics. (2) CHNA methodology redesigned to ensure proportional representation of Medicaid, LEP, and uninsured populations in needs identification. (3) Social determinants interventions — housing, transportation, food access, language access — addressed explicitly alongside clinical interventions for each identified priority. (4) An equity evaluation checkpoint built into every quarterly review: the normative question "are we closing gaps, or widening them?" must be answered with disaggregated data before the strategy can be deemed to be working.`,
    },
    synthesis: {
      prompt: "This failure will appear in three sections of your Strategy instrument. Before you draft them, describe specifically what you will write in each to prevent this:",
      sections: [
        "Population & Community Context — what data will you include and how will you represent it?",
        "Health Equity Commitment — what specific language will move this beyond a values statement?",
        "Evaluation Framework — what disaggregated metrics will you require, and what triggers a course correction?"
      ]
    }
  },
  {
    id: "B2",
    instrument: "policy",
    instrumentLabel: "Population Health Policy Instrument",
    title: "The Policy That Governed No One",
    subtitle: "Toward the Policy Instrument",
    chapters: "Chapters 3, 4, 5, 11",
    principles: ["Formalization", "Cross-Functional Collaboration", "Standardization & Customization"],
    context: `Metropolitan Health issues a new Diversity, Equity & Inclusion Policy as part of its Joint Commission accreditation preparation. The Quality Department is given two weeks to produce it. The document submitted for accreditation review reads in its entirety:

──────────────────────────────────────
METROPOLITAN HEALTH
Policy Number: HR-2024-04
Title: Diversity, Equity and Inclusion Policy
Effective Date: March 1, 2024    Next Review: March 1, 2026

"Metropolitan Health is committed to diversity, equity and inclusion in all aspects of patient care and workforce development. We believe in treating all patients and employees with dignity and respect."
──────────────────────────────────────

TJC Surveyor Finding: "Policy does not meet minimum documentation standards. No scope specified — policy technically applies to no person or department. No definitions provided — key terms are uninterpreted and unenforced. No responsibilities assigned — no named role owns execution. No procedures articulated — no operational guidance exists for any scenario. Policy statement is indistinguishable from a values statement. Unable to assess compliance."`,
    dataTable: {
      caption: "Consequence mapping — what each missing element means for patients and staff:",
      rows: [
        { category: "Missing: Scope", value: "Policy applies to no one", color: "#c94040" },
        { category: "Missing: Definitions", value: "12 departments interpret 'equity' differently", color: "#c94040" },
        { category: "Missing: Responsibilities", value: "No named role owns execution", color: "#c94040" },
        { category: "Missing: Procedures", value: "No protocol when patient reports discriminatory care", color: "#c94040" },
        { category: "Missing: Purpose Statement", value: "No measurable objective; success undefined", color: "#c94040" },
        { category: "Missing: Policy Section", value: "No specific issues resolved; duties unassigned", color: "#c94040" },
      ]
    },
    prediction: {
      question: "Which single missing element poses the greatest direct patient safety risk?",
      options: [
        { value: "A", text: "Missing Scope — without scope, the policy is unenforceable against any individual or department." },
        { value: "B", text: "Missing Procedures — when a patient reports discriminatory care, there is no protocol for investigation, response, or remedy. The patient has no formal recourse." },
        { value: "C", text: "Missing Definitions — without shared definitions, equity violations go unrecognized because staff have no basis for identifying a reportable event." },
      ],
      correct: null // No single correct answer — both B and C are defensible; the analysis unpacks the nuance
    },
    finding: `The TJC surveyor's finding is precise: this is not a policy — it is an aspiration in policy form. The document protects the organization from no accountability because it establishes none. But the most consequential gap is the interaction between missing definitions and missing procedures: staff cannot recognize an equity violation if the organization has never defined what one is, and even if they recognize it, there is no protocol for what to do. The policy's absence is itself an equity failure — it eliminates the patient's formal recourse before any encounter has taken place.`,
    analysis: {
      obvious: `A policy without scope, definitions, responsibilities, or procedures is a statement of intent that cannot be measured, enforced, or operationalized. The TJC surveyor is correct: this document cannot establish compliance because it establishes nothing. Every section that Bhattacharya identifies as essential — scope, purpose, definitions, policy section (responsibilities), procedures — is absent. The Quality Department produced a values statement in the format of a policy header.`,
      nuanced: `The most instructive failure here is not the absence of any single section but the conflation of aspiration with governance. Bhattacharya's principle of formalization is precise on this point: the dispositive issue is whether expectations were formalized — documented in written instruments or adopted through customary practice. A two-sentence commitment statement does neither. Critically, a policy without procedures does not merely fail to help patients who experience inequitable care — it actively harms them by eliminating the formal mechanism through which their experience could be documented, investigated, and remedied. The organization has made a public commitment to equity in its name, and then structured itself so that commitment cannot be kept or evaluated.`,
      action: `Rebuild the policy with all required sections per the textbook framework. The Policy Statement must articulate the governing equity principle — not a platitude but a specific commitment to what the organization will do and not do. The Purpose Statement must define measurable, equity-driven objectives tied to specific outcomes. The Scope must name every department, facility, and patient population it covers — particularly high-risk populations. Definitions must establish organizational-specific meanings for key terms so that "discriminatory care," "equitable treatment," and "equity violation" are not subject to individual interpretation. Responsibilities must assign named roles with specific duties. Procedures must provide step-by-step protocols for at minimum: (1) patient complaint of inequitable care, (2) staff report of an equity violation, and (3) annual equity audit process. Each of these procedures requires that frontline staff — who know the hands-on process — participate in drafting them, per TJC's own recommendation.`,
    },
    synthesis: {
      prompt: "This case maps directly to six sections of your Policy instrument. Before you draft them, answer specifically:",
      sections: [
        "Policy Statement vs. Purpose Statement — how will you ensure they answer three distinct questions rather than repeat the same aspiration?",
        "Scope — who and what will you explicitly include, and why does specificity matter more than breadth?",
        "Procedures — what three patient-facing scenarios will you write procedures for, and who will draft them?"
      ]
    }
  },
  {
    id: "B3",
    instrument: "action",
    instrumentLabel: "Population Health Action Plan",
    title: "The Metrics That Declared Victory While Losing Ground",
    subtitle: "Toward the Action Plan",
    chapters: "Chapters 3, 9, 10, 12",
    principles: ["Comprehensive Evaluation", "Scientific Rigor", "Securing Trust"],
    context: `Northridge Health participates in CMS Hospital Value-Based Purchasing. Over 24 months, their HCAHPS composite score improves from the 65th to 72nd percentile nationally — a 7-point gain. Leadership declares the quality improvement initiative a success, disburses the QI team, and submits a board report with the following executive summary:

"Patient experience has improved significantly. Our investment in communication training has yielded measurable results. The initiative is complete."

The communication training program: 18-month rollout, conducted in English, no cultural adaptation component, reached 94% of clinical staff.

The board report contained one table: the composite HCAHPS trend. It did not contain disaggregated data.`,
    dataTable: {
      caption: "Disaggregated HCAHPS data — collected but not reviewed before the initiative was closed:",
      rows: [
        { category: "White patients", value: "71st → 78th percentile (+7)", color: "#52B788" },
        { category: "Black patients", value: "58th → 54th percentile (−4)", color: "#c94040" },
        { category: "Hispanic patients", value: "49th → 49th percentile (0)", color: "#d48e1a" },
        { category: "Medicaid patients", value: "44th → 40th percentile (−4)", color: "#c94040" },
        { category: "Limited English Proficient", value: "31st → 29th percentile (−2)", color: "#c94040" },
        { category: "Equity gap (White vs. Black)", value: "13 points → 24 points (widened)", color: "#c94040" },
        { category: "Equity gap (White vs. LEP)", value: "40 points → 49 points (widened)", color: "#c94040" },
      ]
    },
    prediction: {
      question: "By Bhattacharya's definition of the purpose of population health policy — to advance health equity — how should this initiative be evaluated?",
      options: [
        { value: "A", text: "Successful — HCAHPS composite improved significantly, meeting the initiative's stated objective." },
        { value: "B", text: "Partially successful — aggregate improvement is real, but equity dimensions were not addressed." },
        { value: "C", text: "Failed — the initiative improved the composite while worsening disparities for Black, Medicaid, and LEP patients. It advanced the average and deepened inequity simultaneously." },
      ],
      correct: "C"
    },
    finding: `The composite improved +7 points. The equity gap between White and Black patients widened from 13 to 24 points. The equity gap between White and LEP patients widened from 40 to 49 points. Four of five subgroups either declined or held flat. The initiative's design — English-only communication training with no cultural adaptation — was structurally unable to produce equity-relevant results for the populations most in need. The normative question Bhattacharya requires — "are we advancing equity?" — was never asked because it was never built into the evaluation framework. The board declared victory on a metric that made the inequity invisible.`,
    analysis: {
      obvious: `Aggregate improvement masked equity deterioration. The initiative succeeded on its stated metric and failed on its more important one. Disbanding the QI team before reviewing disaggregated data means there is no mechanism to detect or correct the worsening disparities. The executive summary's assertion — "patient experience has improved significantly" — is accurate in aggregate and false in equity terms simultaneously. Both statements are true; only one was reported.`,
      nuanced: `This failure has a structural driver: CMS VBP rewards aggregate composite scores, creating a financial incentive to optimize for the already-advantaged population (White, English-proficient, commercially insured patients) whose marginal improvement is easiest to achieve through standard interventions. English-only communication training will reliably benefit English-proficient patients. It cannot produce equity-relevant results for LEP patients not because it is poorly executed, but because it was never designed to reach them. The initiative was designed to improve the average — not close the gap — and it succeeded at exactly what it was designed to do. The policy failure is not in the QI team's execution; it is in the absence of an equity evaluation framework that would have caught this before the initiative closed. Bhattacharya's distinction between normative inquiry (are we doing the right things?) and empirical inquiry (are we doing them effectively?) is precisely relevant: the initiative conducted empirical evaluation only, and found success. Normative evaluation was absent, and that absence is where equity went invisible.`,
      action: `An action plan that prevents this failure must contain five structural commitments: (1) Disaggregated baseline metrics by race, ethnicity, payer, and language as a required starting point — not optional analysis. (2) Equity-specific targets alongside aggregate targets, with explicit definitions of what "closing the gap" means numerically. (3) A normative checkpoint in every quarterly review: the question "are we advancing equity?" answered with subgroup data, not composite data. (4) An explicit course-correction trigger: if any subgroup's metric declines while the composite improves, the initiative is not closed — it is redesigned. (5) Culturally adapted implementation protocols acknowledging that a single program design cannot produce equity-relevant results across linguistically and culturally distinct populations — this is not a nice-to-have; it is the mechanism through which trust with historically underserved communities is built or lost.`,
    },
    synthesis: {
      prompt: "This failure implicates three action plan sections most directly. Before you draft them, commit specifically to:",
      sections: [
        "Equity Goals & Baseline Metrics — what disaggregated data will you require at baseline, and what gap-closing targets will you set?",
        "Evaluation & Progress Tracking — how will you build the normative checkpoint in? What triggers a course correction?",
        "Trust-Building Measures — what does this case tell you a community that experienced worsening outcomes would need to see from the organization before they trusted the next initiative?"
      ]
    }
  }
];

// ─── EXISTING DATA (unchanged) ────────────────────────────────────────────────

const PRINCIPLES = [
  { id: 1, short: "Health Equity", full: "Commit to Advancing Health Equity", chapter: 2, color: "#2D6A4F", description: "The purpose of population health policy is to advance health equity. This foundational principle recognizes that variability in health outcomes among groups demands an equity-driven response rooted in historical understanding and actionable standards.", quiz: [{ q: "How does the textbook define the primary purpose of population health policy?", options: ["To reduce healthcare costs across all populations", "To advance health equity", "To standardize clinical protocols nationwide", "To expand insurance coverage"], answer: 1, explanation: "Bhattacharya argues that health equity is the only acceptable goal, drawing on Dr. Paul Farmer's assertion and situating equity as the cornerstone of all subsequent principles." }, { q: "What distinguishes population health from public health according to Kindig and Stoddart's modern definition?", options: ["Population health focuses on individual patient outcomes only", "Population health addresses health outcomes of a group and their distribution within the group", "Public health focuses on attributable patients in healthcare organizations", "Population health is exclusively concerned with governmental budgets"], answer: 1, explanation: "Kindig and Stoddart coined population health as 'the health outcomes of a group of individuals, including the distribution of such outcomes within the group,' distinguishable from public health's broader governmental focus." }], caseStudy: { title: "Hypertension Management Disparities", context: "A large urban health system notices that Black patients with hypertension have 30-day readmission rates nearly double that of white patients, despite similar clinical presentations at discharge.", prompts: ["What structural and social factors might explain this disparity beyond individual patient behavior?", "How would you apply Principle 1 to frame a policy response — what would 'committing to equity' look like in concrete institutional terms?", "What baseline metrics would you establish, and who would you engage as stakeholders in this process?"], externalSource: "SPRINT Trial (2015) findings on blood pressure control outcomes across demographic groups" }, reflection: "Describe a population health disparity you have observed or read about. What institutional policies may have contributed to it, and what would an equity-centered response look like?" },
  { id: 2, short: "Collaboration", full: "Facilitate Cross-Functional Collaboration", chapter: 3, color: "#1B4332", description: "Advancing health equity requires assembling diverse perspectives across departments — quality and safety, ethics, care coordination, diversity — to create a holistic approach to policy development and implementation.", quiz: [{ q: "Which age-related workforce factor has been identified as significant in emotional exhaustion and depersonalization among nurses?", options: ["Mid-career plateau", "Younger age", "Pre-retirement stress", "Generational mentorship gaps"], answer: 1, explanation: "Research cited in Chapter 3 found that younger age was a significant factor in emotional exhaustion and depersonalization among nurses, underscoring the need for targeted workforce interventions." }, { q: "What does the textbook recommend as a strategy to address intergenerational communication disparities in care?", options: ["Standardized patient assignment by age matching", "Mentoring and training, including intergenerational mentoring programs", "Removing younger nurses from older patient assignments", "Digital-only communication protocols"], answer: 1, explanation: "Mentoring and training — particularly intergenerational mentoring — were associated with positive workforce perceptions, quality patient-centered care, and improved retention." }], caseStudy: { title: "Behavioral Health Integration Failure", context: "A regional hospital system attempts to integrate behavioral health services into primary care. Despite administrative approval, the initiative stalls because clinical staff, social workers, and the ethics committee were never included in the design process.", prompts: ["What cross-functional stakeholders should have been involved from the outset, and why?", "How might siloed decision-making undermine population health outcomes in this scenario?", "Design a brief collaboration protocol that would have prevented this failure."], externalSource: "NCQA Population Health Management Standards on interdisciplinary care teams" }, reflection: "Think of an initiative you've been part of or studied that failed due to insufficient collaboration. What disciplines or perspectives were missing, and how did their absence affect outcomes?" },
  { id: 3, short: "Formalization", full: "Define and Formalize Policy Objectives", chapter: 4, color: "#40916C", description: "Population health policy includes the formalization of rules and directives, documented in written instruments or adopted through customary practice. Formalization provides the structure needed to guide collaborative efforts and sustain equity goals.", quiz: [{ q: "How does The Joint Commission (TJC) distinguish a policy from a procedure?", options: ["Policies provide step-by-step instructions; procedures state principles", "Policies are statements of expectations that guide decisions; procedures articulate how tasks are performed", "Policies apply only to clinical staff; procedures apply to administrators", "There is no functional distinction — TJC treats them identically"], answer: 1, explanation: "TJC defines a policy as a statement of expectations that influences decisions and actions — the rules and principles guiding procedures — while procedures provide step-by-step task instructions." }, { q: "What are the three distinct issues that a well-structured policy document should address?", options: ["Goals, timelines, and budgets", "The overarching principle, why the policy exists, and what specific issues it will resolve", "Scope, staffing, and compliance metrics", "Legislative basis, regulatory alignment, and enforcement mechanism"], answer: 1, explanation: "The textbook distinguishes: (1) the policy statement captures the governing value, (2) the purpose statement explains why the policy exists, and (3) the policy section articulates what specific issues will be resolved." }], caseStudy: { title: "Language Access Policy Scope Error", context: "A multi-site health system applies for national accreditation. Their language access policy was only scoped to select facilities. They receive partial accreditation — only for the facilities listed in the policy's scope section.", prompts: ["What are the patient care implications of a policy with an insufficient scope?", "Using the textbook's framework, how would you revise the policy statement, purpose statement, and scope section?", "What process would you put in place to prevent scope errors in future policy development?"], externalSource: "Sample Language Access Policy included in course materials" }, reflection: "Examine a policy you've encountered — in a workplace, institution, or public setting. Does it clearly articulate its purpose, scope, and the specific issues it resolves? What is missing?" },
  { id: 4, short: "Continuum of Care", full: "Integrate Approaches Across the Continuum of Care", chapter: 5, color: "#52B788", description: "Equity efforts must be sustained from prevention through treatment and rehabilitation. Integration across the care continuum ensures that population health policy is not siloed at any single point of care.", quiz: [{ q: "What does integration across the continuum of care require in terms of policy design?", options: ["A single unified policy for all stages of care", "A continuum of care plan covering prevention, early detection, treatment, and rehabilitation with equity in mind", "Separate policies for each department with no cross-reference", "Focus exclusively on acute care settings where outcomes are most measurable"], answer: 1, explanation: "The fourth principle demands that care plans be comprehensive and inclusive, addressing all stages — prevention, early detection, treatment, rehabilitation — with equity considerations embedded throughout." }], caseStudy: { title: "Discharge Planning Breakdown", context: "A hospital excels at acute care for diabetic patients but has no formalized follow-up protocol. Readmission rates spike at 60 days post-discharge, particularly among patients in low-income zip codes.", prompts: ["Where does the continuum break down in this scenario, and what policies are absent?", "How would you design an integrated approach that addresses prevention, treatment, and post-discharge care?", "What community partnerships would be necessary to sustain this continuum?"], externalSource: "Hospital Readmissions Reduction Program (HRRP) — CMS policy context" }, reflection: "Describe a gap in the care continuum you've observed. At what point does continuity break down, and what structural or policy factors contribute to that breakdown?" },
  { id: 5, short: "Standardization & Customization", full: "Balance Standardization and Customization", chapter: 6, color: "#74C69D", description: "Consistency in care delivery must be balanced with the flexibility to address the unique needs of diverse patient populations. Neither pure standardization nor pure customization alone adequately advances health equity.", quiz: [{ q: "Why is pure standardization insufficient for advancing health equity in population health policy?", options: ["Standardization is too expensive to implement at scale", "One-size-fits-all approaches cannot address the unique social and cultural factors that drive health disparities", "Standardized protocols conflict with TJC accreditation requirements", "Clinical staff resist standardized approaches"], answer: 1, explanation: "Research on tailored health interventions demonstrates that one size does not fit all — customization to demographic, cultural, and social factors is essential for achieving equitable outcomes." }], caseStudy: { title: "Asthma Guidelines Implementation", context: "A health system adopts the National Asthma Education and Prevention Program guidelines. They implement them uniformly across all sites, ignoring that their highest-risk population — children in high-pollution urban neighborhoods — has substantially different trigger profiles and access barriers.", prompts: ["How does this case illustrate the tension between standardization and customization?", "What data would you need to customize the protocol appropriately while maintaining evidence-based standards?", "Draft a brief policy statement that explicitly addresses this balance."], externalSource: "NAEPP Expert Panel Report series (1991–2020) on evolving asthma care guidelines" }, reflection: "Describe a protocol or policy that was applied uniformly but should have been customized. What were the consequences, and what would an appropriately balanced approach have looked like?" },
  { id: 6, short: "Social Needs", full: "Alleviate Health-Related Social Needs", chapter: 7, color: "#95D5B2", description: "Addressing social determinants of health — housing, education, nutrition, economic stability — is critical to achieving health equity. Healthcare organizations must partner with community sectors to build networks of support beyond clinical walls.", quiz: [{ q: "What does the Community Health Needs Assessment (CHNA) require hospitals to document?", options: ["Financial projections for community benefit programs", "The community served, assessment methodologies, stakeholder input, prioritized health needs, and available resources", "Annual physician satisfaction surveys and turnover rates", "Compliance records with CMS billing requirements"], answer: 1, explanation: "The CHNA must provide a comprehensive account of the community served, methodologies used, stakeholder input, prioritized health needs, and descriptions of available resources — all made publicly available." }], caseStudy: { title: "CHNA Without Community Voice", context: "A nonprofit hospital conducts its CHNA using only administrative data and physician surveys. It identifies diabetes and hypertension as top priorities. Community members later report that food insecurity and housing instability — which they consider primary drivers — were never surfaced in the process.", prompts: ["What methodological failures led to this gap, and how does it relate to Principle 6?", "How would you redesign the CHNA process to surface social determinants that communities themselves identify as priorities?", "What implementation strategy components would address the social needs once properly identified?"], externalSource: "IRS Form 990 Schedule H requirements for nonprofit hospital CHNA compliance" }, reflection: "What social determinants of health most significantly affect the population you work with or study? What specific policy levers could a healthcare organization use to address them?" },
  { id: 7, short: "Clinical Alignment", full: "Align with Clinical Operations", chapter: 8, color: "#B7E4C7", description: "Population health policies must be integrated into the daily operations of clinical services. Health equity training for clinical staff ensures that social and clinical care work in concert rather than in parallel.", quiz: [{ q: "What does aligning population health policy with clinical operations require?", options: ["Transferring all population health responsibilities to administrative staff", "Training clinical staff on health equity principles and integrating social and clinical care in daily practice", "Creating a separate population health department with no clinical interface", "Standardizing all clinical workflows regardless of patient population"], answer: 1, explanation: "Alignment means that population health policies are embedded in daily clinical workflows — not siloed — and that clinical staff are trained to understand and apply equity principles in their practice." }], caseStudy: { title: "Value-Based Program Implementation", context: "A health system participates in a CMS value-based purchasing program. The quality metrics improve system-wide, but disaggregated data reveals that outcomes for Medicaid-enrolled patients have stagnated. Clinical teams are unaware of the disparity.", prompts: ["What clinical operations failures allowed this disparity to go undetected and unaddressed?", "How would you embed equity considerations into clinical workflows and performance reviews?", "What policies would ensure that clinical teams are accountable for equity outcomes, not just aggregate metrics?"], externalSource: "CMS Hospital Value-Based Purchasing (VBP) Program — Percentage Payment Summary Report methodology" }, reflection: "How does population health policy currently intersect with clinical operations in a setting you're familiar with? Where are the gaps, and what would genuine alignment require?" },
  { id: 8, short: "Evaluation", full: "Implement Comprehensive Evaluation", chapter: 9, color: "#52B788", description: "Comprehensive evaluation provides the feedback loop necessary for continuous improvement. It includes both normative inquiries (are we doing the right things?) and empirical inquiries (are we doing them effectively?), enabling ongoing policy adaptation.", quiz: [{ q: "What two types of inquiry does comprehensive evaluation in population health policy include?", options: ["Quantitative and qualitative methods", "Normative inquiries and empirical inquiries", "Internal audits and external benchmarking", "Process evaluation and outcome evaluation"], answer: 1, explanation: "The textbook distinguishes normative inquiries (are we doing the right things, aligned with equity values?) from empirical inquiries (are our interventions producing measurable outcomes?), both of which are required for comprehensive evaluation." }], caseStudy: { title: "Quality Metrics Without Equity Lens", context: "A health system reports strong HEDIS scores for preventive care. Leadership celebrates the results. However, no analysis has been conducted on whether these scores vary by race, income, or geography within the covered population.", prompts: ["What does this case reveal about the limits of aggregate metrics in population health evaluation?", "Design a brief evaluation framework that would surface equity-relevant patterns in this data.", "How does the normative/empirical distinction apply to assessing this program's success?"], externalSource: "NCQA HEDIS measures and their application to population health management" }, reflection: "Describe an evaluation framework you've encountered. Did it include both normative and empirical dimensions? What would a more comprehensive approach have included?" },

nstitutional distrust affected health-seeking behavior or policy implementation. What would genuine trust-building require — and how is it different from public relations?" },

async function loadState(key) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : null;
  } catch { return null; }
}
async function saveState(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch {}
}

// ─── BRIDGE MODULE VIEW ───────────────────────────────────────────────────────

function BridgeExerciseCard({ exercise, savedData, onSave }) {
  const [prediction, setPrediction] = useState(savedData?.prediction || null);
  const [predictionSubmitted, setPredictionSubmitted] = useState(savedData?.predictionSubmitted || false);
  const [analysisRevealed, setAnalysisRevealed] = useState(savedData?.analysisRevealed || false);
  const [synthResponses, setSynthResponses] = useState(savedData?.synthResponses || {});
  const [activeLayer, setActiveLayer] = useState("obvious");

  const instrumentColor = { strategy: "#52B788", policy: "#74C69D", action: "#95D5B2" }[exercise.instrument];

  const handleReveal = () => {
    setAnalysisRevealed(true);
    setActiveLayer("obvious");
    onSave({ prediction, predictionSubmitted, analysisRevealed: true, synthResponses });
  };

  const handleSaveSynth = () => {
    onSave({ prediction, predictionSubmitted, analysisRevealed, synthResponses });
  };

  const layerConfig = [
    { id: "obvious", label: "Obvious Takeaway", icon: "◎", color: "#64748b" },
    { id: "nuanced", label: "Nuanced Insight", icon: "◈", color: "#52B788" },
    { id: "action", label: "Actionable Recommendation", icon: "◉", color: "#74C69D" },
  ];

  const layerContent = { obvious: exercise.analysis.obvious, nuanced: exercise.analysis.nuanced, action: exercise.analysis.action };

  return (
    <div style={{ fontFamily: "Georgia, serif", marginBottom: "2rem" }}>
      {/* Exercise Header */}
      <div style={{ background: "linear-gradient(135deg, #071626 0%, #0d2140 100%)", borderRadius: 12, padding: "1.5rem 2rem", marginBottom: "1.2rem" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
          <span style={{ background: "rgba(255,255,255,0.08)", border: `1px solid ${instrumentColor}40`, borderRadius: 20, padding: "2px 12px", fontSize: 11, color: instrumentColor, letterSpacing: "0.08em" }}>
            {exercise.subtitle}
          </span>
          <span style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{exercise.chapters}</span>
        </div>
        <h3 style={{ color: "#f0fdf4", fontSize: "1.4rem", fontWeight: 400, margin: "0 0 0.5rem", fontStyle: "italic" }}>{exercise.title}</h3>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {exercise.principles.map(p => (
            <span key={p} style={{ fontSize: 10, padding: "2px 8px", borderRadius: 10, background: "rgba(116,198,157,0.1)", color: "#74C69D", border: "1px solid rgba(116,198,157,0.2)" }}>{p}</span>
          ))}
        </div>
      </div>

      {/* Phase 1: Context */}
      <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 10, marginBottom: "1rem", overflow: "hidden" }}>
        <div style={{ padding: "0.75rem 1.2rem", background: "rgba(14,158,140,0.08)", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 22, height: 22, borderRadius: "50%", background: "rgba(14,158,140,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: "#52B788" }}>1</div>
          <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#52B788" }}>Clinical Context</span>
        </div>
        <div style={{ padding: "1.2rem" }}>
          <p style={{ color: "#94a3b8", fontSize: 13, lineHeight: 1.75, margin: "0 0 1rem", whiteSpace: "pre-line" }}>{exercise.context}</p>
          {/* Data Table */}
          <div style={{ background: "rgba(0,0,0,0.2)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, overflow: "hidden" }}>
            <div style={{ padding: "0.6rem 1rem", background: "rgba(255,255,255,0.03)", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
              <p style={{ color: "#64748b", fontSize: 11, fontWeight: 600, margin: 0, letterSpacing: "0.05em" }}>{exercise.dataTable.caption}</p>
            </div>
            {exercise.dataTable.rows.map((row, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "0.5rem 1rem", borderBottom: i < exercise.dataTable.rows.length - 1 ? "1px solid rgba(255,255,255,0.04)" : "none" }}>
                <span style={{ color: "#64748b", fontSize: 12, flex: 1, lineHeight: 1.4 }}>{row.category}</span>
                <span style={{ color: row.color, fontSize: 12, fontWeight: 700, minWidth: 180, textAlign: "right" }}>{row.value}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Phase 2: Prediction */}
      <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 10, marginBottom: "1rem", overflow: "hidden" }}>
        <div style={{ padding: "0.75rem 1.2rem", background: "rgba(212,142,26,0.08)", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 22, height: 22, borderRadius: "50%", background: "rgba(212,142,26,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: "#d48e1a" }}>2</div>
          <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#d48e1a" }}>Your Prediction</span>
        </div>
        <div style={{ padding: "1.2rem" }}>
          <p style={{ color: "#e2e8f0", fontSize: 13, fontWeight: 600, lineHeight: 1.6, marginBottom: "1rem" }}>{exercise.prediction.question}</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: "1rem" }}>
            {exercise.prediction.options.map(opt => {
              const isSelected = prediction === opt.value;
              const isCorrect = predictionSubmitted && exercise.prediction.correct && opt.value === exercise.prediction.correct;
              const isWrong = predictionSubmitted && exercise.prediction.correct && isSelected && opt.value !== exercise.prediction.correct;
              let bg = "rgba(255,255,255,0.03)", border = "1px solid rgba(255,255,255,0.08)", color = "#64748b";
              if (isCorrect) { bg = "rgba(45,106,79,0.25)"; border = "1px solid rgba(116,198,157,0.4)"; color = "#B7E4C7"; }
              else if (isWrong) { bg = "rgba(201,64,64,0.15)"; border = "1px solid rgba(201,64,64,0.3)"; color = "#fca5a5"; }
              else if (isSelected && !predictionSubmitted) { bg = "rgba(45,106,79,0.15)"; border = "1px solid rgba(116,198,157,0.3)"; color = "#e2e8f0"; }
              return (
                <button key={opt.value} onClick={() => { if (!predictionSubmitted) setPrediction(opt.value); }}
                  style={{ background: bg, border, borderRadius: 8, padding: "0.75rem 1rem", textAlign: "left", cursor: predictionSubmitted ? "default" : "pointer", color, fontSize: 13, fontFamily: "Georgia, serif", lineHeight: 1.5, transition: "all 0.15s" }}>
                  <strong style={{ marginRight: 8 }}>{opt.value}.</strong>{opt.text}
                </button>
              );
            })}
          </div>
          {!predictionSubmitted && (
            <button onClick={() => { if (prediction) { setPredictionSubmitted(true); onSave({ prediction, predictionSubmitted: true, analysisRevealed, synthResponses }); } }}
              disabled={!prediction}
              style={{ padding: "0.6rem 1.5rem", background: prediction ? "rgba(212,142,26,0.4)" : "rgba(255,255,255,0.04)", border: prediction ? "1px solid rgba(212,142,26,0.5)" : "1px solid rgba(255,255,255,0.08)", borderRadius: 6, color: prediction ? "#f5d68a" : "#475569", cursor: prediction ? "pointer" : "not-allowed", fontFamily: "Georgia, serif", fontSize: 13 }}>
              Submit Prediction
            </button>
          )}
          {predictionSubmitted && exercise.prediction.correct === null && (
            <p style={{ color: "#74C69D", fontSize: 12, lineHeight: 1.6, padding: "0.6rem 0.8rem", background: "rgba(45,106,79,0.1)", border: "1px solid rgba(116,198,157,0.2)", borderRadius: 6 }}>
              Both B and C are defensible — this is intentional. The expert analysis will unpack the distinction.
            </p>
          )}
        </div>
      </div>

      {/* Phase 3: Finding */}
      {predictionSubmitted && (
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 10, marginBottom: "1rem", overflow: "hidden" }}>
          <div style={{ padding: "0.75rem 1.2rem", background: "rgba(255,255,255,0.03)", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 22, height: 22, borderRadius: "50%", background: "rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: "#94a3b8" }}>3</div>
            <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#94a3b8" }}>What the Data Shows</span>
          </div>
          <div style={{ padding: "1.2rem" }}>
            <p style={{ color: "#94a3b8", fontSize: 13, lineHeight: 1.75, margin: 0 }}>{exercise.finding}</p>
          </div>
        </div>
      )}

      {/* Phase 4: Expert Analysis */}
      {predictionSubmitted && !analysisRevealed && (
        <div style={{ textAlign: "center", padding: "1.5rem", marginBottom: "1rem" }}>
          <p style={{ color: "#64748b", fontSize: 13, lineHeight: 1.6, marginBottom: "1rem" }}>
            Before revealing the expert analysis — consider: what is the single most important policy implication of what you've seen?
          </p>
          <button onClick={handleReveal}
            style={{ padding: "0.75rem 2rem", background: "linear-gradient(135deg, #1B4332, #2D6A4F)", border: "1px solid rgba(116,198,157,0.4)", borderRadius: 8, color: "#B7E4C7", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 14 }}>
            Reveal Expert Analysis ↓
          </button>
        </div>
      )}

      {analysisRevealed && (
        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 10, marginBottom: "1rem", overflow: "hidden" }}>
          <div style={{ padding: "0.75rem 1.2rem", background: "rgba(24,167,111,0.08)", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 22, height: 22, borderRadius: "50%", background: "rgba(24,167,111,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: "#52B788" }}>4</div>
            <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#52B788" }}>Expert Analysis</span>
          </div>
          {/* Layer tabs */}
          <div style={{ display: "flex", borderBottom: "1px solid rgba(255,255,255,0.07)" }}>
            {layerConfig.map(layer => (
              <button key={layer.id} onClick={() => setActiveLayer(layer.id)}
                style={{ flex: 1, padding: "0.6rem", background: activeLayer === layer.id ? "rgba(45,106,79,0.2)" : "transparent", border: "none", borderBottom: activeLayer === layer.id ? "2px solid #52B788" : "2px solid transparent", color: activeLayer === layer.id ? "#B7E4C7" : "#475569", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 11, fontWeight: 600, letterSpacing: "0.04em", transition: "all 0.15s", display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}>
                <span>{layer.icon}</span><span>{layer.label}</span>
              </button>
            ))}
          </div>
          <div style={{ padding: "1.2rem" }}>
            <p style={{ color: "#e2e8f0", fontSize: 13, lineHeight: 1.8, margin: 0 }}>{layerContent[activeLayer]}</p>
          </div>
        </div>
      )}

      {/* Synthesis */}
      {analysisRevealed && (
        <div style={{ background: "rgba(45,106,79,0.08)", border: "1px solid rgba(116,198,157,0.2)", borderRadius: 10, padding: "1.2rem" }}>
          <p style={{ color: "#74C69D", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: "0.5rem" }}>
            ◈ Synthesis — Toward Your {exercise.instrumentLabel}
          </p>
          <p style={{ color: "#94a3b8", fontSize: 13, lineHeight: 1.65, marginBottom: "1rem" }}>{exercise.synthesis.prompt}</p>
          {exercise.synthesis.sections.map((section, i) => (
            <div key={i} style={{ marginBottom: "0.8rem" }}>
              <p style={{ color: "#B7E4C7", fontSize: 12, marginBottom: "0.4rem", lineHeight: 1.5 }}>{i + 1}. {section}</p>
              <textarea
                value={synthResponses[i] || ""}
                onChange={e => setSynthResponses({ ...synthResponses, [i]: e.target.value })}
                onBlur={handleSaveSynth}
                placeholder="Your response..."
                style={{ width: "100%", minHeight: 80, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 6, padding: "0.7rem", color: "#e2e8f0", fontSize: 12, fontFamily: "Georgia, serif", lineHeight: 1.6, resize: "vertical", outline: "none", boxSizing: "border-box" }}
              />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function BridgeModuleView({ savedData, onSave, onComplete }) {

function QuizSection({ questions, savedAnswers, onComplete }) {
  const [answers, setAnswers] = useState(savedAnswers || {});
  const [submitted, setSubmitted] = useState(Object.keys(savedAnswers || {}).length === questions.length);

  const handleSubmit = () => {
    setSubmitted(true);
    const score = questions.filter((q, i) => answers[i] === q.answer).length;
    onComplete({ answers, score, total: questions.length });
  };

  return (
    <div>
      {questions.map((q, qi) => (
        <div key={qi} style={{ marginBottom: "1.5rem" }}>
          <p style={{ color: "#e2e8f0", fontSize: 14, lineHeight: 1.6, marginBottom: "0.8rem" }}>
            <strong style={{ color: "#74C69D" }}>Q{qi + 1}.</strong> {q.q}
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {q.options.map((opt, oi) => {
              let bg = "rgba(255,255,255,0.04)", border = "1px solid rgba(255,255,255,0.1)", color = "#94a3b8";
              if (submitted) {
                if (oi === q.answer) { bg = "rgba(45,106,79,0.3)"; border = "1px solid rgba(116,198,157,0.5)"; color = "#B7E4C7"; }
                else if (answers[qi] === oi && oi !== q.answer) { bg = "rgba(185,28,28,0.2)"; border = "1px solid rgba(252,165,165,0.4)"; color = "#fca5a5"; }
              } else if (answers[qi] === oi) { bg = "rgba(45,106,79,0.2)"; border = "1px solid rgba(116,198,157,0.4)"; color = "#f0fdf4"; }
              return (
                <button key={oi} onClick={() => { if (!submitted) setAnswers({ ...answers, [qi]: oi }); }}
                  style={{ background: bg, border, borderRadius: 6, padding: "0.6rem 1rem", textAlign: "left", cursor: submitted ? "default" : "pointer", color, fontSize: 13, fontFamily: "Georgia, serif", transition: "all 0.2s", lineHeight: 1.5 }}>
                  {opt}
                </button>
              );
            })}
          </div>
          {submitted && (
            <div style={{ marginTop: 10, padding: "0.7rem 1rem", background: "rgba(45,106,79,0.15)", borderLeft: "3px solid #52B788", borderRadius: "0 6px 6px 0" }}>
              <p style={{ color: "#B7E4C7", fontSize: 12, lineHeight: 1.6, margin: 0 }}><strong>Explanation:</strong> {q.explanation}</p>
            </div>
          )}
        </div>
      ))}
      {!submitted && (
        <button onClick={handleSubmit} disabled={!questions.every((_, i) => answers[i] !== undefined)}
          style={{ padding: "0.6rem 1.5rem", background: questions.every((_, i) => answers[i] !== undefined) ? "rgba(45,106,79,0.5)" : "rgba(255,255,255,0.05)", border: "1px solid rgba(116,198,157,0.5)", borderRadius: 6, color: "#B7E4C7", cursor: "pointer", fontFamily: "Georgia, serif", fontSize: 13 }}>
          Submit Answers
        </button>
      )}
    </div>
  );
}
